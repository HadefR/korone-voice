<!DOCTYPE html>
<html>
<head>
<title>Korone Voice</title>
</head>
<body>

<h3>Voice Connected</h3>
<button id="muteBtn">Mute</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const params = new URLSearchParams(window.location.search);
const user = params.get("user");
const serverId = params.get("server");

let localStream;
let peers = {};
let audioElements = {};
let muted = false;

navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
    localStream = stream;

    socket.emit("join", { user, serverId });

    // 🔥 TALK DETECTION
    const audioContext = new AudioContext();
    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();
    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function detectTalking() {
        analyser.getByteFrequencyData(data);
        let volume = data.reduce((a,b)=>a+b,0) / data.length;

        socket.emit("talking", {
            user,
            talking: volume > 20,
            serverId
        });

        requestAnimationFrame(detectTalking);
    }
    detectTalking();

    socket.on("users", users => {
        users.forEach(u => {
            if (u !== user && !peers[u]) {
                startPeer(u, user < u);
            }
        });
    });

    socket.on("signal", async (data) => {
        if (!peers[data.from]) startPeer(data.from, false);

        const peer = peers[data.from];

        if (data.signal.type === "offer") {
            await peer.setRemoteDescription(new RTCSessionDescription(data.signal));
            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);

            socket.emit("signal", {
                to: data.from,
                from: user,
                signal: peer.localDescription,
                serverId
            });
        }

        else if (data.signal.type === "answer") {
            await peer.setRemoteDescription(new RTCSessionDescription(data.signal));
        }

        else if (data.signal.candidate) {
            try {
                await peer.addIceCandidate(new RTCIceCandidate(data.signal));
            } catch (e) {}
        }
    });

    socket.on("volume", (data) => {
        const audio = audioElements[data.user];
        if (audio) {
            audio.volume = data.volume;
        }
    });
});

// 🔥 MUTE BUTTON
document.getElementById("muteBtn").onclick = () => {
    muted = !muted;

    localStream.getAudioTracks().forEach(track => {
        track.enabled = !muted;
    });

    document.getElementById("muteBtn").innerText = muted ? "Unmute" : "Mute";
};

function startPeer(target, initiator) {
    const peer = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    localStream.getTracks().forEach(track => {
        peer.addTrack(track, localStream);
    });

    peer.ontrack = (event) => {
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.play();

        audioElements[target] = audio;
    };

    peer.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit("signal", {
                to: target,
                from: user,
                signal: event.candidate,
                serverId
            });
        }
    };

    if (initiator) {
        peer.createOffer().then(offer => {
            peer.setLocalDescription(offer);

            socket.emit("signal", {
                to: target,
                from: user,
                signal: offer,
                serverId
            });
        });
    }

    peers[target] = peer;
}
</script>

</body>
</html>
