<script>
const socket = io();

const params = new URLSearchParams(window.location.search);
const user = params.get("user");
const serverId = params.get("server");

navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

    socket.emit("join", { user, serverId });

    const audioContext = new AudioContext();
    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();

    analyser.fftSize = 256;
    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    let smoothed = 0;

    function detectTalking() {
        analyser.getByteFrequencyData(data);

        let volume = data.reduce((a,b)=>a+b,0) / data.length;

        // 🔥 SMOOTHING
        smoothed = smoothed * 0.8 + volume * 0.2;

        // 🔥 THRESHOLD (ADJUSTED FOR YOUR MIC)
        let talking = smoothed > 11;

        console.log("Volume:", volume, "Smooth:", smoothed, "Talking:", talking);

        socket.emit("talking", {
            user: user,
            talking: talking,
            serverId: serverId
        });

        requestAnimationFrame(detectTalking);
    }

    detectTalking();
});
</script>
