<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:sans-serif">

<h2 id="status">Allow mic 🎤</h2>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const params = new URLSearchParams(window.location.search);
const user = params.get("user");
const serverId = params.get("server");

const statusText = document.getElementById("status");

navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

    statusText.innerText = "🎤 Mic Connected";

    socket.emit("join", { user, serverId });

    const audioContext = new AudioContext();
    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();

    analyser.fftSize = 256;
    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    let lastVolume = 0;

    function detectTalking() {
        analyser.getByteFrequencyData(data);

        let volume = data.reduce((a,b)=>a+b,0) / data.length;

        // 🔥 REAL TALK DETECTION (CHANGE BASED)
        let talking = Math.abs(volume - lastVolume) > 2;

        console.log("Volume:", volume, "Talking:", talking);

        socket.emit("talking", {
            user: user,
            talking: talking,
            serverId: serverId
        });

        lastVolume = volume;

        requestAnimationFrame(detectTalking);
    }

    detectTalking();

}).catch(err => {
    statusText.innerText = "❌ MIC BLOCKED";
    console.error(err);
});
</script>

</body>
</html>
