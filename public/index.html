<!DOCTYPE html>
<html>
<head>
<title>Voice</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body style="background:#111;color:white;text-align:center">

<h2>Enter Code</h2>
<input id="code" placeholder="Code"/>
<button onclick="join()">Join</button>

<script>

let socket = io();
let peers = {};
let audioEls = {};
let myStream;

async function join(){

  let code = document.getElementById("code").value;

  let res = await fetch("/join", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ code })
  });

  let data = await res.json();

  const user = data.user;
  const serverId = data.serverId;

  myStream = await navigator.mediaDevices.getUserMedia({ audio:true });

  socket.emit("join", { user, serverId });

  socket.on("peers", list=>{
    list.forEach(p=>createPeer(p.id, true));
  });

  socket.on("peer-joined", p=>{
    createPeer(p.id, false);
  });

  socket.on("signal", async ({from,data})=>{
    let pc = peers[from];

    if(data.sdp){
      await pc.setRemoteDescription(data.sdp);
      if(data.sdp.type==="offer"){
        let ans = await pc.createAnswer();
        await pc.setLocalDescription(ans);
        socket.emit("signal",{to:from,data:{sdp:pc.localDescription}});
      }
    }

    if(data.ice){
      await pc.addIceCandidate(data.ice);
    }
  });

}

async function createPeer(id, init){

  let pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  myStream.getTracks().forEach(t=>pc.addTrack(t,myStream));

  pc.ontrack = e=>{
    let audio = new Audio();
    audio.srcObject = e.streams[0];
    audio.autoplay = true;
    audioEls[id] = audio;
  };

  pc.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,data:{ice:e.candidate}});
    }
  };

  if(init){
    let offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("signal",{to:id,data:{sdp:pc.localDescription}});
  }

  peers[id]=pc;
}

</script>

</body>
</html>
