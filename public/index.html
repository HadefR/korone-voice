<!DOCTYPE html>
<html>
<body style="background:black;color:white;font-family:sans-serif;text-align:center">

<h2 id="status">Click Allow for voice 🎤</h2>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const params = new URLSearchParams(window.location.search);
const user = params.get("user");
const serverId = params.get("server");

const statusText = document.getElementById("status");

navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

    statusText.innerText = "🎤 Voice Connected";

    socket.emit("join", { user, serverId });

    const audioContext = new AudioContext();
    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();

    analyser.fftSize = 256;
    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function detectTalking() {
        analyser.getByteFrequencyData(data);

        let volume = 0;
        for (let i = 0; i < data.length; i++) {
            volume += data[i];
        }
        volume /= data.length;

        console.log("Volume:", volume);

        socket.emit("talking", {
            user,
            talking: volume > 8,
            serverId
        });

        requestAnimationFrame(detectTalking);
    }

    detectTalking();

    socket.on("mute", (data) => {
        if (data.user === user) {
            stream.getAudioTracks().forEach(track => {
                track.enabled = !data.muted;
            });
        }
    });

}).catch(err => {
    statusText.innerText = "❌ Mic blocked — allow permission";
});
</script>

</body>
</html>
