<!DOCTYPE html>
<html>
<head>
  <title>Voice Chat</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      background: #00a2ff;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background: #008ad6;
    }

    #status {
      margin-top: 20px;
      color: #aaa;
    }
  </style>
</head>

<body>

<h1>Voice Chat</h1>

<button id="micBtn">Enable Mic</button>

<div id="status">Not Connected</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const user = params.get("user");
  const server = params.get("server");

  let talking = false;
  let stream = null;

  const btn = document.getElementById("micBtn");
  const status = document.getElementById("status");

  async function sendTalk(state) {
    try {
      await fetch("/talk", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user: user,
          talking: state,
          serverId: server
        })
      });
    } catch (e) {}
  }

  // 🎤 REQUEST MIC
  btn.onclick = async () => {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      status.innerText = "Mic Enabled";
      btn.innerText = "Hold Space to Talk";

      setupPushToTalk();

    } catch (e) {
      status.innerText = "Mic Permission Denied";
    }
  };

  // 🎮 PUSH TO TALK (SPACE KEY)
  function setupPushToTalk() {

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" && !talking) {
        talking = true;
        status.innerText = "Talking...";
        sendTalk(true);
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "Space") {
        talking = false;
        status.innerText = "Connected";
        sendTalk(false);
      }
    });
  }
</script>

</body>
</html>
