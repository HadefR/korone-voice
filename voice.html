<!DOCTYPE html>
<html>
<head>
  <title>Voice Chat</title>
  <style>
    body {
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }
  </style>
</head>
<body>

<h2 id="status">Requesting microphone...</h2>

<script>
async function startVoice() {
  try {
    // 🔥 THIS IS THE IMPORTANT PART
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    document.getElementById("status").innerText = "Microphone allowed ✔";

    // 👉 here you will later connect to your voice server
    console.log("Mic stream:", stream);

  } catch (err) {
    document.getElementById("status").innerText = "Microphone denied ❌";
    console.error(err);
  }
}

startVoice();
</script>

</body>
</html>
